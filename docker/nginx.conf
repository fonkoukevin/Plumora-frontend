# Serves the Flutter Web release bundle (build/web) as a single-page app.
#
# Listens on 8080 (unprivileged port, matches nginxinc/nginx-unprivileged and
# the HEALTHCHECK/EXPOSE in the Dockerfile). Caddy (in the backend repo's
# docker-compose stack) is expected to reverse-proxy to this container —
# see docs/deployment-frontend.md.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static text assets — main.dart.js in particular is large, and
    # compresses very well. Binary assets (wasm, fonts, images) are skipped:
    # they're already dense and gzipping them wastes CPU for little gain.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # index.html, the service worker and version.json drive Flutter's own
    # cache-busting after a redeploy — they must always be revalidated.
    location ~ ^/(index\.html|flutter_service_worker\.js|version\.json)$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Everything else: a short cache. Stock `flutter build web` output does
    # not content-hash filenames (main.dart.js keeps the same name across
    # builds), so a long/immutable cache risks serving stale JS after a
    # redeploy — an hour bounds that risk while still avoiding a re-fetch on
    # every navigation.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=3600";
        # SPA fallback: any route go_router owns (e.g. /admin/users,
        # /author/manuscripts/42, /books/12/read) resolves as a real static
        # file 404s here and falls back to index.html, where Flutter's own
        # router takes over — this is what makes a direct link or a page
        # refresh on a deep route work.
        try_files $uri $uri/ /index.html;
    }
}
