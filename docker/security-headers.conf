# Lives outside conf.d/ on purpose: nginx's main config auto-includes every
# conf.d/*.conf file at the http level, and this snippet (bare add_header
# lines, no server {} wrapper) is only meant to be pulled in explicitly —
# included from every `location` block in nginx.conf, since nginx's
# add_header does NOT inherit into a location that defines its own
# add_header (e.g. the per-location Cache-Control below), so these must be
# repeated per-location rather than set once at the server level.
#
# Compatible with Flutter Web's default (CanvasKit) renderer: it needs
# same-origin WebAssembly compilation, worker-src blob: (CanvasKit's
# worker), and inline style attributes (Flutter's engine sets
# `style="..."` on DOM nodes for text/semantics layout). connect-src allows
# any HTTPS origin because the API origin (API_BASE_URL) is only known at
# Flutter *build* time, baked into main.dart.js — not visible to this
# static, environment-agnostic nginx config.
#
# script-src/frame-src/style-src also allow https://accounts.google.com:
# "Connexion avec Google" (lib/core/network/google_auth_config.dart) uses
# Google Identity Services, whose web SDK injects its own
# <script src="https://accounts.google.com/gsi/client"> at runtime, loads
# its own stylesheet from https://accounts.google.com/gsi/style, and
# renders the sign-in button/prompt in an iframe from the same origin —
# missing any one of the three is a silent CSP violation (same failure
# shape the CanvasKit CDN block had: everything else on the page keeps
# working, only this feature quietly never completes — confirmed live: the
# style-src omission surfaced as the flow reporting "annulée ou échouée"
# with a console violation on gsi/style, even after script-src/frame-src
# were already fixed).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;
