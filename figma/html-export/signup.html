<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Plumora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="min-h-screen flex items-center justify-center bg-background px-4">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center space-y-4">
        <div class="flex items-center justify-center gap-2">
          <svg class="icon-lg text-primary" viewBox="0 0 24 24" stroke-width="1.5">
            <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path>
            <line x1="16" y1="8" x2="2" y2="22"></line>
            <line x1="17.5" y1="15" x2="9" y2="15"></line>
          </svg>
          <h1 class="text-4xl font-bold text-primary">Plumora</h1>
        </div>
        <p class="text-muted-foreground">Créez votre compte</p>
      </div>

      <div class="card shadow-sm space-y-6" style="padding: 2rem;">
        <div>
          <label for="firstName" class="label">Prénom</label>
          <input
            id="firstName"
            type="text"
            class="input"
            placeholder="Kevin"
          />
        </div>

        <div>
          <label for="lastName" class="label">Nom</label>
          <input
            id="lastName"
            type="text"
            class="input"
            placeholder="Martin"
          />
        </div>

        <div>
          <label for="email" class="label">Email</label>
          <input
            id="email"
            type="email"
            class="input"
            placeholder="votre@email.com"
          />
        </div>

        <div>
          <label for="password" class="label">Mot de passe</label>
          <input
            id="password"
            type="password"
            class="input"
            placeholder="••••••••"
          />
        </div>

        <div>
          <label for="confirmPassword" class="label">Confirmer le mot de passe</label>
          <input
            id="confirmPassword"
            type="password"
            class="input"
            placeholder="••••••••"
          />
        </div>

        <button class="btn btn-primary w-full btn-lg" onclick="navigateTo('role-selection.html')">
          Créer mon compte
        </button>

        <div class="text-center text-sm text-muted-foreground">
          Déjà un compte ?
          <a href="login.html" class="link">
            Se connecter
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="navigation.js"></script>
</body>
</html>
