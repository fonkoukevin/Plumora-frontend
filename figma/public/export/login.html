<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Plumora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="min-h-screen flex items-center justify-center bg-background px-4">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center space-y-3">
        <div class="flex items-center justify-center mb-6">
          <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center shadow-lg">
            <svg class="w-9 h-9 text-white" viewBox="0 0 24 24" stroke-width="1.5">
              <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path>
              <line x1="16" y1="8" x2="2" y2="22"></line>
              <line x1="17.5" y1="15" x2="9" y2="15"></line>
            </svg>
          </div>
        </div>
        <h1 class="text-3xl font-bold text-foreground">Bienvenue sur Plumora</h1>
        <p class="text-muted-foreground">Connectez-vous pour continuer votre aventure littéraire</p>
      </div>

      <div class="card shadow-lg space-y-6" style="padding: 2rem;">
        <div class="space-y-4">
          <div>
            <label for="email" class="label">Adresse email</label>
            <input
              id="email"
              type="email"
              class="input"
              placeholder="votre@email.com"
            />
          </div>

          <div>
            <label for="password" class="label">Mot de passe</label>
            <input
              id="password"
              type="password"
              class="input"
              placeholder="••••••••"
            />
          </div>

          <div class="text-right">
            <a href="#" class="text-sm text-secondary link">
              Mot de passe oublié ?
            </a>
          </div>
        </div>

        <button class="btn btn-primary w-full btn-lg" onclick="navigateTo('home.html')">
          Se connecter
        </button>

        <div class="relative">
          <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid var(--border);"></div>
          <div class="relative flex justify-center text-sm">
            <span style="padding: 0 1rem; background: var(--card); color: var(--muted-foreground);">ou</span>
          </div>
        </div>

        <button
          onclick="navigateTo('home.html')"
          class="w-full flex items-center justify-center gap-3 px-4 py-3 border-2 border-border rounded-xl transition-colors"
          style="background: transparent;"
          onmouseover="this.style.backgroundColor='var(--muted)'"
          onmouseout="this.style.backgroundColor='transparent'"
        >
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.20443C17.64 8.56625 17.5827 7.95262 17.4764 7.36353H9V10.8449H13.8436C13.635 11.9699 13.0009 12.9231 12.0477 13.5613V15.8194H14.9564C16.6582 14.2526 17.64 11.9453 17.64 9.20443Z" fill="#4285F4"/>
            <path d="M8.99976 18C11.4298 18 13.467 17.1941 14.9561 15.8195L12.0475 13.5613C11.2416 14.1013 10.2107 14.4204 8.99976 14.4204C6.65567 14.4204 4.67158 12.8372 3.96385 10.71H0.957031V13.0418C2.43794 15.9831 5.48158 18 8.99976 18Z" fill="#34A853"/>
            <path d="M3.96409 10.7098C3.78409 10.1698 3.68182 9.59301 3.68182 8.99983C3.68182 8.40665 3.78409 7.82983 3.96409 7.28983V4.95801H0.957273C0.347727 6.17301 0 7.54755 0 8.99983C0 10.4521 0.347727 11.8266 0.957273 13.0416L3.96409 10.7098Z" fill="#FBBC05"/>
            <path d="M8.99976 3.57955C10.3211 3.57955 11.5075 4.03364 12.4402 4.92545L15.0216 2.34409C13.4629 0.891818 11.4257 0 8.99976 0C5.48158 0 2.43794 2.01682 0.957031 4.95818L3.96385 7.29C4.67158 5.16273 6.65567 3.57955 8.99976 3.57955Z" fill="#EA4335"/>
          </svg>
          <span class="font-medium text-foreground">Continuer avec Google</span>
        </button>

        <div class="text-center text-sm text-muted-foreground" style="padding-top: 0.5rem;">
          Pas encore de compte ?
          <a href="signup.html" class="link font-medium">
            S'inscrire
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="navigation.js"></script>
</body>
</html>
