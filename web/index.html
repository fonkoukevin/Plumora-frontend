<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <script>
    // Flutter's web engine unconditionally strips this tag and replaces it
    // with a hardcoded `user-scalable=no` one at startup (see
    // FullPageEmbeddingStrategy._applyViewportMeta in the engine sources —
    // it removes every <meta name="viewport"> and appends its own, marked
    // with a flt-viewport attribute). Declaring our own tag above has no
    // effect on its own; this observer puts the permissive value back the
    // instant the engine overwrites it, so pinch-zoom keeps working for
    // low-vision users and the Lighthouse accessibility audit passes.
    (function () {
      var PERMISSIVE_CONTENT =
        'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes';

      function enforce() {
        var meta = document.querySelector('meta[name="viewport"]');
        if (meta && meta.getAttribute('content') !== PERMISSIVE_CONTENT) {
          meta.setAttribute('content', PERMISSIVE_CONTENT);
        }
      }

      new MutationObserver(enforce).observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['content'],
      });
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="plumora_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>plumora_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
